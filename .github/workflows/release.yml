name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: 'v0.0.0-dev'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.9'

# ─────────────────────────── Platform builds ────────────────────────────────

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk dicom-viewer-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dicom-viewer-android.apk
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package
        run: |
          tar -czf dicom-viewer-linux-x64.tar.gz \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dicom-viewer-linux-x64.tar.gz
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────

  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath dicom-viewer-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dicom-viewer-windows-x64.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package
        run: |
          ditto -c -k --keepParent \
            "build/macos/Build/Products/Release/dicom_viewer.app" \
            dicom-viewer-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dicom-viewer-macos.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────

  build-ios:
    name: iOS (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r dicom-viewer-ios.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dicom-viewer-ios.ipa
          if-no-files-found: error

  # ─────────────────────────── GitHub Release ─────────────────────────────

  release:
    name: Create Release
    needs: [build-android, build-linux, build-windows, build-macos, build-ios]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Resolve version tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create / update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.ver.outputs.tag }}
          name: DICOM Viewer ${{ steps.ver.outputs.tag }}
          allowUpdates: true
          removeArtifacts: true
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "artifacts/**/*"
          body: |
            ## DICOM Viewer ${{ steps.ver.outputs.tag }}

            Cross-platform DICOM / MRI viewer with 2D slice view, multi-planar reconstruction, and interactive 3D volume rendering.

            ### Downloads

            | Platform | File | Notes |
            |---|---|---|
            | 🍎 macOS | `dicom-viewer-macos.zip` | Unzip → right-click the `.app` → Open (to bypass Gatekeeper) |
            | 🪟 Windows | `dicom-viewer-windows-x64.zip` | Unzip and run `dicom_viewer.exe` |
            | 🐧 Linux | `dicom-viewer-linux-x64.tar.gz` | Extract and run `./dicom_viewer` |
            | 📱 iOS | `dicom-viewer-ios.ipa` | Unsigned — sideload via AltStore or Sideloadly |
            | 🤖 Android | `dicom-viewer-android.apk` | Enable *Install from unknown sources* first |

  # ─────────────────────────── GitHub Pages ────────────────────────────────

  deploy-pages:
    name: Deploy Landing Page
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir _site
          sed "s|__GITHUB_REPOSITORY__|${{ github.repository }}|g" \
            .github/pages/index.html > _site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
