name: Deploy to Google Play

# Builds a signed Android App Bundle (package eu.imsc.dicomviewer) and uploads
# it to Google Play via fastlane (internal track, or promote to production).
#
# Required repository secrets:
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON   Play Console service account JSON key (raw contents)
#   ANDROID_KEYSTORE_BASE64            base64 of the release upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD          keystore password
#   ANDROID_KEY_ALIAS                  key alias inside the keystore
#   ANDROID_KEY_PASSWORD               password for the key alias

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        default: 'beta'
        type: choice
        options: ['beta', 'release']

permissions:
  contents: read

concurrency:
  group: google-play-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.41.9'

jobs:
  deploy-android:
    name: android ${{ github.event.inputs.lane || 'beta' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANDROID_PACKAGE_NAME: eu.imsc.dicomviewer
      GOOGLE_PLAY_JSON_KEY_PATH: fastlane/google-play-key.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Write Google Play service account key
        run: |
          mkdir -p fastlane
          cat > fastlane/google-play-key.json <<'EOF_PLAY_JSON'
          ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          EOF_PLAY_JSON
          test -s fastlane/google-play-key.json
          python3 -c "import json,sys; json.load(open('fastlane/google-play-key.json'))"

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Run fastlane
        env:
          LANE: ${{ github.event.inputs.lane || 'beta' }}
        run: bundle exec fastlane android "$LANE"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-android
          path: build/app/outputs/bundle/**/*/*.aab
          if-no-files-found: ignore
